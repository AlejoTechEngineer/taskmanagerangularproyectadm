<div class="login-container">
    <button class="theme-toggle" (click)="toggleTheme()">
        @if (isDarkMode) {
        <span>☀️</span>
        } @else {
        <span>🌙</span>
        }
    </button>

    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <span class="logo-icon">📋</span>
            </div>
            <h1>Task Manager</h1>
            <p>Bienvenido de vuelta</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" [(ngModel)]="username"
                        [class.error]="errors.username" placeholder="Ingresa tu usuario" />
                </div>
                @if (errors.username) {
                <span class="error-message">{{ errors.username }}</span>
                }
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" [(ngModel)]="password"
                        [class.error]="errors.password" placeholder="Ingresa tu contraseña" />
                </div>
                @if (errors.password) {
                <span class="error-message">{{ errors.password }}</span>
                }
            </div>

            @if (generalError) {
            <div class="alert alert-error">
                {{ generalError }}
            </div>
            }

            <button class="submit-button" (click)="onSubmit()" [disabled]="isLoading">
                @if (isLoading) {
                <span class="spinner-small"></span>
                <span>Iniciando sesión...</span>
                } @else {
                <span>Iniciar Sesión</span>
                }
            </button>

            <div class="login-footer">
                <p>Credenciales de prueba:</p>
                <p><strong>Usuario:</strong> admin | <strong>Contraseña:</strong> admin</p>
                <p><strong>Usuario:</strong> user | <strong>Contraseña:</strong> user</p>
            </div>
        </div>
    </div>
</div>
